name: Update YouTube Videos

on:
  schedule:
    # Once daily at 10:17 AM UTC
    - cron: '17 10 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-youtube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest YouTube videos
        run: python pipeline/youtube_videos.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet web/public/data/youtube_videos.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated YouTube data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/youtube_videos.json
          git commit -m "Update YouTube videos $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
